services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: shipment_tracker
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/tracker/models/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/tracker/models/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d shipment_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://tracker:tracker_dev@db:5432/shipment_tracker
      AIS_PROVIDER: mock
      CORS_ORIGINS: http://localhost:3001
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/live
      NEXT_PUBLIC_MAPBOX_TOKEN: ${MAPBOX_TOKEN:-pk.placeholder}
    depends_on:
      - backend

volumes:
  pgdata:
