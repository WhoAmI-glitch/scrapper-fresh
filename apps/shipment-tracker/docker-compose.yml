services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: shipment_tracker
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tracker_dev}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/tracker/models/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/tracker/models/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d shipment_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      TRACKER_DB_HOST: db
      TRACKER_DB_PORT: "5432"
      TRACKER_DB_NAME: shipment_tracker
      TRACKER_DB_USER: tracker
      TRACKER_DB_PASSWORD: ${DB_PASSWORD:-tracker_dev}
      TRACKER_AIS_PROVIDER: ${AIS_PROVIDER:-mock}
      TRACKER_AIS_API_KEY: ${AIS_API_KEY:-}
      TRACKER_CORS_ORIGINS: '["http://localhost:3001","${FRONTEND_URL:-http://localhost:3001}"]'
      TRACKER_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TRACKER_DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      TRACKER_JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      TRACKER_GMAIL_CREDENTIALS_PATH: /app/credentials/gmail_credentials.json
      TRACKER_GMAIL_TOKEN_PATH: /app/credentials/gmail_token.json
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./credentials:/app/credentials:ro
    deploy:
      resources:
        limits:
          memory: 1G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${WS_URL:-ws://localhost:8000/ws/live}
      NEXT_PUBLIC_MAPBOX_TOKEN: ${MAPBOX_TOKEN:-pk.placeholder}
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pgdata:
