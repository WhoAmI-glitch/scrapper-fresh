name: Deliver News Digest

on:
  schedule:
    # Run every day at 07:00 UTC (10:00 Moscow time)
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force delivery even if no new content"
        required: false
        default: "false"
        type: boolean

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.4"
  PYTHON_VERSION: "3.12"

jobs:
  deliver:
    name: Generate & Deliver Digest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        working-directory: apps/api
        run: |
          uv venv .venv
          uv pip install -e "."

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          NEWS_RSS_FEEDS: ${{ secrets.NEWS_RSS_FEEDS }}
        run: |
          echo "Generating news digest..."
          # TODO: Implement digest generation
          # pnpm --filter news-worker run generate

      - name: Deliver to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          bash infra/scripts/deliver-telegram-digest.sh

      - name: Upload digest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: data/exports/digest-*.md
          retention-days: 30
