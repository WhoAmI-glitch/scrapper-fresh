<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Agent System Dashboard</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #232736;
      --border: #2d3148;
      --text: #e2e4eb;
      --text-muted: #8b8fa3;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --blue: #3b82f6;
      --orange: #f97316;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header .subtitle {
      color: var(--text-muted);
      font-size: 13px;
    }

    .health-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .health-healthy { background: rgba(34,197,94,0.15); color: var(--green); }
    .health-unhealthy { background: rgba(239,68,68,0.15); color: var(--red); }
    .health-loading { background: rgba(139,143,163,0.15); color: var(--text-muted); }

    .tabs {
      display: flex;
      gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      overflow-x: auto;
    }

    .tab {
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent-light); border-bottom-color: var(--accent); }

    main { padding: 24px; max-width: 1400px; margin: 0 auto; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }

    .card-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .card-value {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .card-detail {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 10px 12px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }

    tr:hover td { background: var(--surface-2); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-pending { background: rgba(139,143,163,0.15); color: var(--text-muted); }
    .badge-assigned { background: rgba(59,130,246,0.15); color: var(--blue); }
    .badge-in_progress { background: rgba(249,115,22,0.15); color: var(--orange); }
    .badge-review { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .badge-done { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-failed { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge-accept { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-reject { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge-defer { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .badge-critical { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge-high { background: rgba(249,115,22,0.15); color: var(--orange); }
    .badge-normal { background: rgba(59,130,246,0.15); color: var(--blue); }
    .badge-low { background: rgba(139,143,163,0.15); color: var(--text-muted); }
    .badge-opus { background: rgba(139,92,246,0.15); color: #a78bfa; }
    .badge-sonnet { background: rgba(59,130,246,0.15); color: var(--blue); }
    .badge-haiku { background: rgba(34,197,94,0.15); color: var(--green); }

    .section { display: none; }
    .section.active { display: block; }

    .mono { font-family: 'SF Mono', Menlo, monospace; font-size: 12px; }

    pre {
      background: var(--surface-2);
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--text-muted);
    }

    @media (max-width: 768px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      main { padding: 16px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Multi-Agent System</h1>
    <span class="subtitle">Control Panel</span>
  </div>
  <span id="health-badge" class="health-badge health-loading">checking...</span>
</header>

<div class="tabs" id="tabs">
  <div class="tab active" data-tab="overview">Overview</div>
  <div class="tab" data-tab="tasks">Tasks</div>
  <div class="tab" data-tab="agents">Agents</div>
  <div class="tab" data-tab="decisions">Decisions</div>
  <div class="tab" data-tab="artifacts">Artifacts</div>
  <div class="tab" data-tab="health">Health</div>
</div>

<main>
  <!-- Overview -->
  <div class="section active" id="section-overview">
    <div class="grid" id="overview-cards"></div>
    <div class="card">
      <div class="card-title">Task Status Distribution</div>
      <div id="task-status-chart" style="padding: 16px 0;"></div>
    </div>
  </div>

  <!-- Tasks -->
  <div class="section" id="section-tasks">
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Status</th>
            <th>Priority</th>
            <th>Agent</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody id="tasks-table"></tbody>
      </table>
    </div>
  </div>

  <!-- Agents -->
  <div class="section" id="section-agents">
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Model</th>
            <th>Role</th>
            <th>Tasks</th>
          </tr>
        </thead>
        <tbody id="agents-table"></tbody>
      </table>
    </div>
  </div>

  <!-- Decisions -->
  <div class="section" id="section-decisions">
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Type</th>
            <th>Decision</th>
            <th>Reference</th>
            <th>Decided By</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="decisions-table"></tbody>
      </table>
    </div>
  </div>

  <!-- Artifacts -->
  <div class="section" id="section-artifacts">
    <div class="grid" id="artifact-cards"></div>
  </div>

  <!-- Health -->
  <div class="section" id="section-health">
    <div class="card">
      <div class="card-title">System Health Report</div>
      <pre id="health-output">Loading...</pre>
    </div>
  </div>
</main>

<script>
const API = '';

async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// Tab switching
document.getElementById('tabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById(`section-${tab.dataset.tab}`).classList.add('active');
});

// Overview
async function loadOverview() {
  const data = await fetchJSON(`${API}/api/overview`);

  const cards = [
    { title: 'Tasks', value: data.tasks.total, detail: Object.entries(data.tasks.by_status).map(([k,v]) => `${v} ${k}`).join(', ') || 'none' },
    { title: 'Agents', value: data.agents, detail: 'registered in REGISTRY.json' },
    { title: 'Skills', value: data.skills.total, detail: `${data.skills.s_tier} s-tier, ${data.skills.a_tier} a-tier` },
    { title: 'Commands', value: data.commands, detail: 'custom commands' },
    { title: 'Schemas', value: data.schemas, detail: 'JSON schemas' },
  ];

  document.getElementById('overview-cards').innerHTML = cards.map(c => `
    <div class="card">
      <div class="card-title">${c.title}</div>
      <div class="card-value">${c.value}</div>
      <div class="card-detail">${c.detail}</div>
    </div>
  `).join('');

  // Status chart (text-based)
  const statuses = data.tasks.by_status;
  const total = data.tasks.total || 1;
  const chart = Object.entries(statuses).map(([status, count]) => {
    const pct = Math.round(count / total * 100);
    const bar = '\u2588'.repeat(Math.max(1, Math.round(pct / 2)));
    return `<div style="display:flex;align-items:center;gap:12px;margin:4px 0">
      <span class="badge badge-${status}" style="min-width:90px;text-align:center">${status}</span>
      <span style="color:var(--accent-light);font-family:monospace">${bar}</span>
      <span class="mono" style="color:var(--text-muted)">${count} (${pct}%)</span>
    </div>`;
  }).join('');
  document.getElementById('task-status-chart').innerHTML = chart || '<div class="empty-state">No tasks yet</div>';
}

// Tasks
async function loadTasks() {
  const tasks = await fetchJSON(`${API}/api/tasks`);
  const tbody = document.getElementById('tasks-table');
  if (!tasks.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No tasks</td></tr>';
    return;
  }
  tbody.innerHTML = tasks.map(t => `
    <tr>
      <td class="mono">${t.id || ''}</td>
      <td>${t.title || ''}</td>
      <td><span class="badge badge-${t.status}">${t.status}</span></td>
      <td><span class="badge badge-${t.priority}">${t.priority || ''}</span></td>
      <td class="mono">${t.assigned_agent || '-'}</td>
      <td class="mono">${(t.created_at || '').slice(0, 10)}</td>
    </tr>
  `).join('');
}

// Agents
async function loadAgents() {
  const [agents, utilization] = await Promise.all([
    fetchJSON(`${API}/api/agents`),
    fetchJSON(`${API}/api/agent-utilization`),
  ]);
  const tbody = document.getElementById('agents-table');
  tbody.innerHTML = agents.map(a => {
    const u = utilization[a.name] || { total: 0 };
    return `
      <tr>
        <td class="mono">${a.name}</td>
        <td><span class="badge badge-${a.model}">${a.model}</span></td>
        <td>${a.role || ''}</td>
        <td>${u.total}</td>
      </tr>
    `;
  }).join('');
}

// Decisions
async function loadDecisions() {
  const decisions = await fetchJSON(`${API}/api/decision-audit`);
  const tbody = document.getElementById('decisions-table');
  if (!decisions.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No decisions</td></tr>';
    return;
  }
  tbody.innerHTML = decisions.map(d => `
    <tr>
      <td class="mono">${d.id || ''}</td>
      <td>${d.type || ''}</td>
      <td><span class="badge badge-${d.decision}">${d.decision}</span></td>
      <td class="mono">${d.reference_id || ''}</td>
      <td>${d.decided_by || ''}</td>
      <td class="mono">${(d.created_at || '').slice(0, 10)}</td>
    </tr>
  `).join('');
}

// Artifacts
async function loadArtifacts() {
  const data = await fetchJSON(`${API}/api/overview`);
  const arts = data.artifacts;
  document.getElementById('artifact-cards').innerHTML = Object.entries(arts).map(([name, count]) => `
    <div class="card">
      <div class="card-title">${name.replace(/_/g, ' ')}</div>
      <div class="card-value">${count}</div>
    </div>
  `).join('');
}

// Health
async function loadHealth() {
  try {
    const data = await fetchJSON(`${API}/api/health`);
    document.getElementById('health-output').textContent = data.output || 'No output';
    const badge = document.getElementById('health-badge');
    badge.textContent = data.status;
    badge.className = `health-badge health-${data.status}`;
  } catch {
    document.getElementById('health-output').textContent = 'Failed to fetch health status';
  }
}

// Load all data
Promise.all([
  loadOverview(),
  loadTasks(),
  loadAgents(),
  loadDecisions(),
  loadArtifacts(),
  loadHealth(),
]).catch(err => console.error('Dashboard load error:', err));
</script>

</body>
</html>
